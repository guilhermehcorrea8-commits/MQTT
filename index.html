<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Dashboard Industrial
    </title>

    <link rel="stylesheet" href="style.css">

    <!-- MQTT -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <header>

        <h1>
            Monitor Industrial
        </h1>

        <div id="mqttStatus">
            MQTT Offline
        </div>

        <button id="darkModeBtn">
            🌙 Dark Mode
        </button>

    </header>

    <section class="dashboard">

        <div class="card temperatura">
            <h2>Temperatura</h2>
            <p id="temperatura">
                -- °C
            </p>
        </div>

        <div class="card umidade">
            <h2>Umidade</h2>
            <p id="umidade">
                -- %
            </p>
        </div>

        <div class="card vibracao">
            <h2>Vibração</h2>
            <p id="vibracao">
                --
            </p>
        </div>

        <div class="card status">
            <h2>Status Máquina</h2>
            <p id="status">
                Desconhecido
            </p>
        </div>

    </section>

    <section class="controle">

        <button id="ligarBtn">
            Ligar Máquina
        </button>

        <button id="desligarBtn">
            Desligar Máquina
        </button>

    </section>

    <section class="alertaArea">

        <h2>
            Alertas
        </h2>

        <div id="alertas">

            Nenhum alerta

        </div>

    </section>

    <section class="info">

        <p>
            Última atualização:
            <span id="ultimaAtualizacao">
                --
            </span>
        </p>

    </section>

    <section class="graficos">

        <div class="graficoBox">
            <canvas id="graficoTemp"></canvas>
        </div>

        <div class="graficoBox">
            <canvas id="graficoUmidade"></canvas>
        </div>

        <div class="graficoBox">
            <canvas id="graficoVibracao"></canvas>
        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
